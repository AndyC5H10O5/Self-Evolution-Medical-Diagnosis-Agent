skills:
  - skill_key: abdominal_pain
    name: abdominal-pain
    label: 肚子痛
    path: skills/abdominal-pain/SKILL.md
    use_when: >
      当患者描述肚子痛、腹部绞痛、胃部疼痛，或伴随消化道不适时使用。
    evolvable_fields:
      - 疼痛部位
      - 疼痛性质
      - 伴随症状

  - skill_key: headache
    name: headache
    label: 头痛
    path: skills/headache/SKILL.md
    use_when: >
      当患者主诉头痛、头胀、偏头痛，或伴随畏光恶心等头部相关症状时使用。
    evolvable_fields:
      - 头痛部位
      - 头痛性质
      - 伴随症状

  - skill_key: nausea
    name: nausea
    label: 恶心
    path: skills/nausea/SKILL.md
    use_when: >
      当患者主诉恶心、反胃、干呕，或出现想吐、进食后不适等上消化道不适时使用。
    evolvable_fields:
      - 是否呕吐
      - 伴随症状
      - 近期诱因

  - skill_key: insomnia
